{% extends "bbq_app/base.html" %}

{% block title %}持ち物テンプレ管理{% endblock %}

{% block content %}
<h1>持ち物テンプレ管理</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">追加</button>
</form>

<ul>
{% for item in items %}
    <li>
        {{ item.name }}({{ item.get_category_display }})
    </li>

{% empty %}
    <li>テンプレ持ち物はまだありません</li>
{% endfor %}
</ul>

{% endblock %}
