{% load static %}

{% if event %}
<div class="event-header">

  <div class="event_header__top">
    <div>
      <div class="event-header__title">{{ event.name }}</div>
      <div class="event-header__meta">
        開催日時：{{ event.held_at|date:"Y年m月d日 H:i" }}<br>
        開催場所：{{ event.location }}
      </div>
    </div>

    <div class="event-header__actions">
      <a href="{% url 'event_edit' event.id %}">✏️ 編集</a>
      <a href="{% url 'event_delete' event.id %}">🗑 削除</a>
    </div>
  </div>

  <div class="event-header__nav">

    <!-- 持ち物 -->
    <a href="{% url 'item_edit' event.id %}"
       class="{% if request.resolver_match.url_name == 'item_edit' %}active{% endif %}">
      <img src="{% static 'bbq_app/images/item_edit.png' %}" width="28">
      <span>持ち物編集</span>
    </a>

    <!-- 担当者 -->
    <a href="{% url 'item_assign' event.id %}"
       class="{% if request.resolver_match.url_name == 'item_assign' %}active{% endif %}">
      <img src="{% static 'bbq_app/images/event_participants.png' %}" width="28">
      <span>担当者一覧</span>
    </a>

    <!-- イベント共有 -->
    <a href="{% url 'event_share' event.id %}"
       class="{% if request.resolver_match.url_name == 'event_share' %}active{% endif %}">
      <img src="{% static 'bbq_app/images/event_share.png' %}" width="28" alt="共有">
      <span>イベント共有</span>
    </a>

    <!-- 忘れ物登録 -->
    <a href="#"
       onclick="openForgotModal(); return false;">
      <img src="{% static 'bbq_app/images/forgot_item.png' %}" width="28">
      <span>忘れ物登録</span>
    </a>

  </div>

<div id="forgotModal" class="modal">
    <div class="modal-content">
        <h2>忘れ物を追加</h2>

        <form method="post" action="{% url 'forgotten_item_create' event.id %}">
            {% csrf_token %}

            <input type="text" name="name" placeholder="持ち物名">

            <p>該当カテゴリーを選択してください。</p>

            <label><input type="radio" name="category" value="1">火起こし・調理グッズ</label>
            <label><input type="radio" name="category" value="2">会場設営</label>
            <label><input type="radio" name="category" value="3">食材・飲み物</label>
            <label><input type="radio" name="category" value="4">便利グッズ</label>
            <label><input type="radio" name="category" value="5">その他</label>

            <div class="modal-actions">
                <button type="submit">登録</button>
                <button type="button" onclick="closeForgotModal()">閉じる</button>
            </div>
        </form>
    </div>
</div>
{% endif %}
