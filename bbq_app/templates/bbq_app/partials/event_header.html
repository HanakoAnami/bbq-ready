{% load static %}

{% if event %}
<div class="event-header">

  <div class="event_header__top">
    <div>
      <div class="event-header__title">{{ event.name }}</div>
      <div class="event-header__meta">
        開催日時：{{ event.held_at|date:"Y年m月d日 H:i" }}<br>
        開催場所：{{ event.location }}
      </div>
    </div>

    <div class="event-header__actions">
      <a href="{% url 'event_edit' event.id %}">✏️ 編集</a>
      <a href="{% url 'event_delete' event.id %}">🗑 削除</a>
    </div>
  </div>

  <div class="event-header__nav">
    <a href="{% url 'item_edit' event.id %}"
      class="{% if request.resolver_match.url_name == 'item_edit' %}"active{% endif %}">
      <img src="{% static 'bbq_app/images/item_edit.png' %}" width="28" alt="持ち物">
      <span>持ち物編集</span>
    </a>

    <a href="{% url 'event_participants' event.id %}"
      class="{% if request.resolver_match.url_name == 'event_participants' %}"active{% endif %}">
      <img src="{% static 'bbq_app/images/event_participants.png' %}" width="28" alt="担当者">
      <span>担当者一覧</span>

     <a href="#"
      class="{% if request.resolver_match.url_name == 'event_share' %}"active{% endif %}">
      <img src="{% static 'bbq_app/images/event_share.png' %}" width="28" alt="共有">
      <span>イベント共有</span>

       <a href="#"
      class="{% if request.resolver_match.url_name == 'forgot_item' %}"active{% endif %}">
      <img src="{% static 'bbq_app/images/forgot_item.png' %}" width="28" alt="忘物">
      <span>忘れ物登録</span>

    </a>

</div>
{% endif %}
