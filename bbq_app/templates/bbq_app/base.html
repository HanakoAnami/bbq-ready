{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BBQ Ready{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'bbq_app/css/style.css' %}">
</head>
<body>
    {% block header %}{% endblock %}
    {% if messages %}
        <div class="flash-messages">
            {% for message in messages %}
                <div class="flash {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    <main>{% block content %}{% endblock %}</main>

    {% block footer %}
        {% include "bbq_app/partials/footer_nav.html" %}
    {% endblock %}

<script>
function openForgotModal() {
    document.getElementById("forgotModal").style.display = "block";
}

function closeForgotModal() {
    document.getElementById("forgotModal").style.display = "none";
}

function copyInviteUrl(url) {
    navigator.clipboard.writeText(url)
        .then(() => {
            alert("リンクをコピーしました。");
        })
        .catch(() => {
            alert("コピーに失敗しました。");
        });
}

function openSharedUsersModal() {
    document.getElementById("sharedUsersModal").style.display = "block";
}
function closeSharedUsersModal() {
    document.getElementById("sharedUsersModal").style.display = "none";
}

function openDuplicateModal(eventId){
    document.getElementById("duplicateModal-" + eventId).style.display = "block";
}

function closeDuplicateModal(eventId){
    document.getElementById("duplicateModal-" + eventId).style.display = "none";
}

function openDeleteModal(eventId){
    document.getElementById("deleteModal-" + eventId).style.display = "block";
}

function closeDeleteModal(eventId){
    document.getElementById("deleteModal-" + eventId).style.display = "none";
}

</script>

</body>
