{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BBQ Ready{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'bbq_app/css/style.css' %}">
</head>
<body>
    {% block header %}{% endblock %}
    {% if messages %}
        <div class="flash-messages">
            {% for message in messages %}
                <div class="flash {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    <main>{% block content %}{% endblock %}</main>

    {% block footer %}
        {% include "bbq_app/partials/footer_nav.html" %}
    {% endblock %}

    <script>
    function openForgotModal() {
        const modal = document.getElementById("forgotModal");
        if (modal) modal.style.display = "block";
    }

    function closeForgotModal() {
        const modal = document.getElementById("forgotModal");
        if (modal) modal.style.display = "none";
    }

    function copyInviteUrl(url) {
        navigator.clipboard.writeText(url)
            .then(() => {
                alert("リンクをコピーしました");
            })
            .catch(() => {
                alert("コピーに失敗しました");
            });
    }

    function openSharedUsersModal() {
        const modal = document.getElementById("sharedUsersModal");
        if (modal) modal.style.display = "block";
    }

    function closeSharedUsersModal() {
        const modal = document.getElementById("sharedUsersModal");
        if (modal) modal.style.display = "none";
    }

    function openDuplicateModal(eventId) {
        const modal = document.getElementById("duplicateModal-" + eventId);
        if (modal) modal.style.display = "block";
    }

    function closeDuplicateModal(eventId) {
        const modal = document.getElementById("duplicateModal-" + eventId);
        if (modal) modal.style.display = "none";
    }

    function openDeleteModal(eventId) {
        const modal = document.getElementById("deleteModal-" + eventId);
        if (modal) modal.style.display = "block";
    }

    function closeDeleteModal(eventId) {
        const modal = document.getElementById("deleteModal-" + eventId);
        if (modal) modal.style.display = "none";
    }

    function openParticipantsModal() {
        const modal = document.getElementById("participantsModal");
        if (modal) modal.style.display = "block";
    }

    function closeParticipantsModal() {
        const modal = document.getElementById("participantsModal");
        if (modal) modal.style.display = "none";
    }
    </script>
</body>
</html>
