{% extends "bbq_app/base.html" %}

{% block content %}
<h1>イベント参加者追加</h1>

<form method="post">
    {% csrf_token %}
    <input type="text" name="name" placeholder="参加者名を入力">
    <button type="submit">追加</button>
</form>

<hr>

<ul>
    {% for participant in participants %}
        <li>{{ participant.name }}</li>
    {% empty %}
        <li>参加者はまだいません</li>
    {% endfor %}
</ul>

<p><a href="{% url 'item_assign' event.id %}">担当者割り当てへ</a></p>
{% endblock %}
