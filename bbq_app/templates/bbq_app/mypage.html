{% extends "bbq_app/base.html" %}
{% block title %}マイページ{% endblock %}

{% block content %}
<div class="mypage-page">
    <h2 class="mypage-title">マイページ</h2>
    <p class="mypage-description">こちらで登録アカウント内容を変更できます。</p>

    <div class="mypage-card">
        <div class="mypage-menu">
            <a class="mypage-menu__item" href="{% url 'mypage_name' %}">ユーザー名変更</a>
            <a class="mypage-menu__item" href="{% url 'mypage_email' %}">メールアドレス変更</a>
            <a class="mypage-menu__item" href="{% url 'mypage_password' %}">パスワード変更</a>

            <form method="post" action="{% url 'logout' %}" class="mypage-logout-form">
                {% csrf_token %}
                <button type="submit" class="mypage-logout-btn">ログアウト</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
