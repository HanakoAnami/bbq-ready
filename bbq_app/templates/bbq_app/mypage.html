{% extends "bbq_app/base.html" %}
{% block title %}マイページ{% endblock %}

{% block page_class %}page-with-topbar{% endblock %}

{% block content %}

<div class="mypage-page" style="padding-top: 8px;">
    <p class="mypage-description">
        こちらで登録アカウント内容を変更できます。
    </p>

    <div class="mypage-menu">
        <a href="{% url 'mypage_name' %}" class="mypage-menu-btn">
            ユーザー名変更
        </a>

        <a href="{% url 'mypage_email' %}" class="mypage-menu-btn">
            メールアドレス変更
        </a>

        <a href="{% url 'mypage_password' %}" class="mypage-menu-btn">
            パスワード変更
        </a>

        <button type="button" class="mypage-menu-btn logout-btn" onclick="openLogoutModal()">
            ログアウト
        </button>
    </div>
</div>

<div id="logoutModal" class="modal">
    <div class="modal-content">
        <h2>ログアウトしますか？</h2>

        <div class="modal-actions">
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">はい</button>
            </form>

            <button type="button" onclick="closeLogoutModal()">いいえ</button>
        </div>
    </div>
</div>

<script>
function openLogoutModal() {
    const modal = document.getElementById("logoutModal");
    if (modal) modal.style.display = "block";
}

function closeLogoutModal() {
    const modal = document.getElementById("logoutModal");
    if (modal) modal.style.display = "none";
}
</script>
{% endblock %}
